<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CommUnity | Requests</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="src/request.css">
</head>
<body>

<div class="app">
     <!-- SIDEBAR -->
 <aside class="sidebar">

    <div class="brand">
      <img src="images/CommUnity Logo.png" alt="CommUnity Logo" class="brand-logo" />
      <span>CommUnity</span>
    </div>

    <nav class="menu">
      <a class="active">
        <img src="icons/home.png" class="menu-icon" />
        <span>Home</span>
      </a>
      <a>
        <img src="icons/reports.png" class="menu-icon" />
        <span>Reports</span>
      </a>
      <a>
        <img src="icons/requests.png" class="menu-icon" />
        <span>Requests</span>
      </a>
      <a>
        <img src="icons/rewards.png" class="menu-icon" />
        <span>Rewards</span>
      </a>
      <a>
        <img src="icons/analytics.png" class="menu-icon" />
        <span>Analytics</span>
      </a>
    </nav>

    <div class="logout">Log Out</div>
  </aside>



  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <input id="searchInput" type="text" placeholder="Search requests..." />
      <div class="top-actions">🔔 <span>Admin</span></div>
    </header>

    <!-- STATS -->
    <section class="stats">
      <div class="stat-card blue">
        <h2 id="totalRequests">0</h2>
        <span>Total Requests</span>
      </div>
      <div class="stat-card purple">
        <h2 id="reviewingCount">0</h2>
        <span>Reviewing</span>
      </div>
      <div class="stat-card amber">
        <h2 id="processingCount">0</h2>
        <span>Processing</span>
      </div>
      <div class="stat-card green">
        <h2 id="readyCount">0</h2>
        <span>Ready for Pickup</span>
      </div>
      <div class="stat-card gray">
        <h2 id="releasedCount">0</h2>
        <span>Released</span>
      </div>
    </section>

    <!-- FILTERS -->
    <section class="filters">
      <strong>Requests</strong>
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="reviewing">Reviewing</option>
        <option value="processing">Processing</option>
        <option value="ready">Ready for Pickup</option>
        <option value="released">Released</option>
      </select>
    </section>

    <!-- TABLE -->
    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th>Request ID</th>
            <th>Document</th>
            <th>Resident</th>
            <th>Status</th>
            <th>Date Submitted</th>
          </tr>
        </thead>
        <tbody id="requestsTable">
          <!-- API DATA -->
        </tbody>
      </table>

      <div id="emptyState" class="empty-state">
        No requests found.
      </div>
    </section>

  </main>
</div>

</body>
</html>
